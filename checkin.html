<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in | Spin4All</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            /* Aumentado padding superior */
            font-family: 'Outfit', sans-serif;
            color: #fff;
            margin: 0;
        }

        .checkin-header {
            text-align: center;
            margin-bottom: 4rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            /* Aumentado gap entre título e subtítulo */
            position: relative;
            /* Garante que segue o fluxo normal */
        }

        .checkin-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
            color: #fff;
            /* Força a cor branca para o 'Spin' */
        }

        .checkin-header h1 span {
            color: #38bdf8;
        }

        .checkin-header .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #64748b;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
            position: relative;
            z-index: 10;
            /* Garante que não fique atrás de nada */
        }

        .search-container input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.8);
            /* Fundo mais sólido */
            color: #fff;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #38bdf8;
            font-size: 1.2rem;
        }

        /* Grid de Membros */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            overflow-y: auto;
            padding: 0.5rem 0.5rem 3rem 0.5rem;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .member-card:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            transform: translateY(-5px);
        }

        .member-card.present {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.05);
        }

        .member-card.present::after {
            content: "\f058";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 10px;
            color: #4ade80;
            font-size: 1.2rem;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            overflow: hidden; /* Garantir que a imagem siga o círculo */
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-card.present .avatar {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.3);
        }

        .member-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #1e293b;
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-card h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-yes {
            background: #38bdf8;
            color: #fff;
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-undo {
            background: #ef4444;
            color: #fff;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Feedback Card specific */
        .feedback-card i {
            font-size: 4rem;
            color: #4ade80;
            margin-bottom: 1.5rem;
        }

        /* Top Actions Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .clock-display {
            font-size: 3.8rem;
            font-weight: 800;
            color: #f8fafc;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            font-variant-numeric: tabular-nums;
            margin-bottom: -15px;
            position: relative;
            z-index: 10;
        }

        /* Toggle Switch */
        .view-toggle {
            display: flex;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 50px;
            padding: 0.5rem;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-btn {
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active {
            background: #38bdf8;
            color: #fff;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        /* Layout Dinâminco (Dual Column) */
        .checkin-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            align-items: stretch;
            height: calc(100vh - 250px);
            margin: 2rem auto 0;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 1200px) {
            .checkin-container {
                grid-template-columns: 300px 1fr;
                gap: 15px;
            }
        }

        @media (max-width: 1024px) {
            .checkin-container {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: visible;
                padding-bottom: 50px;
            }

            .present-list-col {
                flex: none;
                width: 100%;
                max-height: 400px;
            }

            .absent-grid-col {
                height: auto;
                min-height: 500px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                height: auto;
                padding: 15px;
                gap: 15px;
            }

            .header-left {
                width: 100%;
                justify-content: center;
            }

            .header-right {
                width: 100%;
                justify-content: center;
                gap: 10px;
            }

            .search-container {
                width: 100%;
            }

            #memberSearch {
                width: 100% !important;
            }

            .clock-box {
                font-size: 1rem;
            }

            .playlist-card {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .checkin-container {
                padding: 10px;
            }

            .member-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }

            .member-card {
                padding: 15px 10px;
            }

            .avatar {
                width: 60px;
                height: 60px;
                font-size: 1.4rem;
            }

            .member-name {
                font-size: 0.9rem;
            }
        }

        .present-list-col {
            flex: 0 0 350px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            height: 100%;
        }

        .absent-grid-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 0; /* fix grid blowout */
            height: 100%;
            overflow: hidden;
        }

        .col-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .col-header h2 {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: #38bdf8;
        }

        .scrollable-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scrollbar-width: thin;
        }

        /* Playlist Card Style (Compact) */
        .playlist-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .playlist-card:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .playlist-card .avatar {
            width: 45px;
            height: 45px;
            font-size: 1.1rem;
            flex-shrink: 0;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .playlist-card .info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .playlist-card .name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #f1f5f9;
        }

        .playlist-card .time-entry {
            font-size: 0.75rem;
            font-weight: 800;
            color: #4ade80;
            text-transform: uppercase;
        }

        /* Views */
        #view-checkin {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #view-workout {
            display: none;
            max-width: 1400px;
            gap: 2rem;
            margin-top: 4rem;
            /* compensar clock */
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
            position: sticky;
            top: 20px;
            z-index: 50;
        }

        /* Present Overlay effect */
        .member-card.present {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.05);
            opacity: 0.6;
            filter: grayscale(30%);
        }

        /* WORKOUT / TIMER STYLES */
        .workout-timer-container {
            text-align: center;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -25px;
        }

        .timer-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .massive-timer {
            font-size: 16rem;
            font-weight: 800;
            color: #eab308;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 50px rgba(234, 179, 8, 0.4);
            transition: color 0.3s;
        }

        .massive-timer.paused {
            color: #64748b;
            text-shadow: none;
            opacity: 0.8;
            animation: pulse-paused 2s infinite alternate;
        }

        .massive-clock-checkin {
            font-size: 14rem;
            font-weight: 800;
            color: #f8fafc;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
            font-variant-numeric: tabular-nums;
            margin-bottom: 2rem;
            line-height: 1;
        }

        @keyframes pulse-paused {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 0.4;
            }
        }

        .massive-timer.ending {
            color: #ef4444;
            text-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
            animation: pulse 1s infinite alternate;
        }

        .massive-timer.rest {
            color: #4ade80;
            text-shadow: 0 0 40px rgba(74, 222, 128, 0.4);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.05);
            }
        }

        .workout-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem;
            width: 100%;
            margin-top: 2rem;
        }

        .catalog-col {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .catalog-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .catalog-btn {
            width: 100%;
            text-align: left;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 1.2rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .catalog-btn:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: #38bdf8;
            transform: translateX(5px);
        }

        .catalog-btn i {
            color: #38bdf8;
            font-size: 1.2rem;
        }

        .btn-start-all {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: auto;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
            transition: all 0.3s;
        }

        .btn-start-all:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(34, 197, 94, 0.5);
        }

        .queues-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .queue-col {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .queue-title {
            font-size: 1.3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .queue-title .clear-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .queue-title .clear-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #fff;
        }

        /* Status Colors */
        .color-iniciante {
            color: #facc15;
        }

        .color-intermediario {
            color: #38bdf8;
        }

        .color-avancado {
            color: #ef4444;
        }

        .playcard {
            background: rgba(30, 41, 59, 0.9);
            padding: 1.2rem;
            border-radius: 12px;
            border-left: 5px solid;
            position: relative;
            margin-bottom: 10px;
        }

        .playcard.status-green {
            border-color: #4ade80;
        }

        .playcard.status-yellow {
            border-color: #eab308;
            background: rgba(234, 179, 8, 0.1);
        }

        .playcard.status-red {
            border-color: #ef4444;
            opacity: 0.4;
            filter: grayscale(80%);
        }

        .playcard.status-rest {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.15);
        }

        .playcard.status-rest .time {
            color: #7dd3fc;
        }

        .playcard.status-rest .desc {
            color: #bae6fd;
        }

        .playcard .desc {
            font-weight: 700;
            color: #fff;
            font-size: 1.05rem;
            margin-right: 25px;
            line-height: 1.3;
            word-break: break-word;
        }

        .playcard .time {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .playcard .card-actions {
            position: absolute;
            right: 10px;
            top: 10px;
            display: flex;
            gap: 8px;
        }

        .playcard .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
            color: #f1f5f9;
            padding: 5px 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .playcard .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .playcard .action-btn.delete:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .playcard .action-btn.finish:hover {
            border-color: #4ade80;
            color: #4ade80;
        }

        .playcard .action-btn.pause:hover {
            border-color: #eab308;
            color: #eab308;
        }

        .playcard .action-btn.resume {
            background: #eab308;
            color: #000;
            border-color: #eab308;
        }

        .playcard .action-btn.resume:hover {
            background: #fbbf24;
        }

        .playcard.is-paused {
            opacity: 0.7;
            border-style: dashed;
        }

        /* Setup Modal */
        #setupOverlay .modal-card {
            max-width: 450px;
        }

        .time-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .btn-round {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-round:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
        }

        .time-value {
            font-size: 3rem;
            font-weight: 800;
            color: #38bdf8;
            font-variant-numeric: tabular-nums;
            width: 80px;
            text-align: center;
        }

        .level-selector-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .level-tag {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            background: transparent;
            cursor: pointer;
        }

        .level-tag.active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.5);
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <a href="dashboard.html" class="btn-back"><i class="fas fa-chevron-left"></i> Voltar</a>
        <!-- O relogio mudou para cima do timer! -->
    </div>

    <header class="checkin-header">
        <h1>Spin<span>4All</span></h1>

        <div class="view-toggle">
            <button class="toggle-btn active" onclick="switchView('checkin')" id="btn-view-checkin"><i
                    class="fas fa-user-check"></i> Check-in</button>
            <button class="toggle-btn" onclick="switchView('workout')" id="btn-view-workout"><i
                    class="fas fa-stopwatch"></i> Painel Treino</button>
        </div>
    </header>

    <!-- VIEWS -->

    <!-- 1. CHECK-IN VIEW -->
    <div id="view-checkin">
        <div class="massive-clock-checkin" id="bigClockCheckin">--:--</div>

        <div class="checkin-container">
            <!-- Esquerda: Playlist de Presença -->
            <aside class="present-list-col">
                <div class="col-header">
                    <h2><i class="fas fa-users-check" style="margin-right: 10px;"></i> Presença Agora</h2>
                    <span id="presentCount" style="font-size: 0.9rem; color: #4ade80; font-weight: 800; background: rgba(74, 222, 128, 0.1); padding: 2px 8px; border-radius: 10px;">0</span>
                </div>
                <div class="scrollable-area" id="presentList">
                    <!-- Membros presentes via JS -->
                </div>
            </aside>

            <!-- Direita: Grade de Check-in -->
            <section class="absent-grid-col">
                <div class="search-container" style="margin-bottom: 0; max-width: 100%; position: relative; top: 0; z-index: 5;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="memberSearch" placeholder="Quem está treinando agora?">
                </div>
                <div class="scrollable-area">
                    <div class="members-grid" id="membersGrid" style="max-width: 100%; padding: 0;">
                        <!-- Membros ausentes via JS -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 2. WORKOUT ORCHESTRATOR VIEW -->
    <div id="view-workout">
        <div class="workout-timer-container">
            <div class="clock-display" id="mainClock">--:--</div>
            <div class="timer-label" id="masterTimerLabel">PRÓXIMA TROCA EM:</div>
            <div class="massive-timer" id="masterTimer">00:00</div>
        </div>

        <div class="workout-grid">

            <div class="catalog-col">
                <div class="catalog-title"><i class="fas fa-list-ul"></i> Catálogo</div>

                <div id="catalogList"
                    style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; max-height: 450px; overflow-y: auto; padding-right: 5px;">
                    <!-- Renderizado pelo JS do Catalogo -->
                </div>

                <div style="margin-top: auto; display:flex; flex-direction: column; gap: 15px;">
                    <button class="catalog-btn" onclick="openCustomModal()" style="border-style: dashed;"><i
                            class="fas fa-plus-circle"></i> Novo (Avulso)</button>
                    <button class="btn-start-all" id="btnStartAll" onclick="toggleWorkoutState()"><i
                            class="fas fa-play"></i> Iniciar Treino</button>
                </div>
            </div>

            <div class="queues-container">
                <div class="queue-col" id="col-iniciante">
                    <div class="queue-title">
                        <span class="color-iniciante">Iniciante</span>
                        <button class="clear-btn" onclick="clearQueue('iniciante')" title="Limpar Fila"><i
                                class="fas fa-trash"></i></button>
                    </div>
                    <div class="playcards-area" id="list-iniciante"></div>
                </div>
                <div class="queue-col" id="col-intermediario">
                    <div class="queue-title">
                        <span class="color-intermediario">Intermediário</span>
                        <button class="clear-btn" onclick="clearQueue('intermediario')" title="Limpar Fila"><i
                                class="fas fa-trash"></i></button>
                    </div>
                    <div class="playcards-area" id="list-intermediario"></div>
                </div>
                <div class="queue-col" id="col-avancado">
                    <div class="queue-title">
                        <span class="color-avancado">Avançado</span>
                        <button class="clear-btn" onclick="clearQueue('avancado')" title="Limpar Fila"><i
                                class="fas fa-trash"></i></button>
                    </div>
                    <div class="playcards-area" id="list-avancado"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Confirmation Overlay -->
    <div id="confirmOverlay" class="overlay">
        <div class="modal-card">
            <h2 id="confirmTitle">Você é Sergio?</h2>
            <div class="modal-actions">
                <button class="btn btn-no" onclick="closeModals()">NÃO</button>
                <button id="btnConfirm" class="btn btn-yes">SIM, SOU EU</button>
            </div>
        </div>
    </div>

    <!-- Undo Overlay -->
    <div id="undoOverlay" class="overlay">
        <div class="modal-card">
            <h2 id="undoTitle">Olá Sergio!</h2>
            <p style="color: #94a3b8; margin-bottom: 2rem;">Sua presença já está marcada.</p>
            <div class="modal-actions">
                <button class="btn btn-no" onclick="closeModals()">FECHAR</button>
                <button id="btnUndo" class="btn btn-undo">DESMARCAR PRESENÇA</button>
            </div>
        </div>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="successOverlay" class="overlay">
        <div class="modal-card feedback-card">
            <i class="fas fa-check-circle"></i>
            <h2 id="feedback-name">Olá!</h2>
            <p id="feedback-msg">Presença confirmada!</p>
        </div>
    </div>

    <!-- Setup Workout Modal -->
    <div id="setupOverlay" class="overlay">
        <div class="modal-card">
            <h2 id="setupTitle">Configurar Treino</h2>
            <div id="customNameContainer" style="display: none; margin-bottom: 1.5rem;">
                <input type="text" id="customDescInput" placeholder="Nome do exercício..."
                    style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 1.1rem; text-align: center; margin-bottom: 10px;">
                <label
                    style="color: #94a3b8; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <input type="checkbox" id="saveToCatalogCheck">
                    Salvar no Catálogo Definitivo
                </label>
            </div>
            <p id="setupType" style="color: #94a3b8; margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;"></p>

            <div class="level-selector-tags" id="levelSelector">
                <button class="level-tag active" data-level="todos">Todas Turmas</button>
                <button class="level-tag" data-level="iniciante">Iniciante</button>
                <button class="level-tag" data-level="intermediario">Intermediário</button>
                <button class="level-tag" data-level="avancado">Avançado</button>
            </div>

            <div class="time-selector">
                <button class="btn-round" onclick="adjustTime(-1)"><i class="fas fa-minus"></i></button>
                <div class="time-value" id="setupMinutes">5</div>
                <button class="btn-round" onclick="adjustTime(1)"><i class="fas fa-plus"></i></button>
            </div>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: -10px; margin-bottom: 2rem;">MINUTOS</p>

            <div class="modal-actions">
                <button class="btn btn-no" onclick="closeModals()">Cancelar</button>
                <button class="btn btn-yes" onclick="addToQueue()">Adicionar à Fila</button>
            </div>
        </div>
    </div>

    <audio id="audioBeep" src="https://www.myinstants.com/media/sounds/beep-07a.mp3" preload="auto"></audio>

    <script>
        const API_URL = (window.location.hostname.includes('spin4all.com.br'))
            ? 'https://spin4all-motor.h5rvsp.easypanel.host/api'
            : window.location.origin + '/api';

        // --- RELOGIO DE PAREDE ---
        function updateMainClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${h}:${m}`;

            if (document.getElementById('mainClock')) document.getElementById('mainClock').innerText = timeStr;
            if (document.getElementById('bigClockCheckin')) document.getElementById('bigClockCheckin').innerText = timeStr;
        }
        setInterval(updateMainClock, 1000);
        updateMainClock();

        // --- TOGGLE VIEWS ---
        function switchView(viewName) {
            document.getElementById('view-checkin').style.display = viewName === 'checkin' ? 'flex' : 'none';
            document.getElementById('view-workout').style.display = viewName === 'workout' ? 'flex' : 'none';

            document.getElementById('btn-view-checkin').classList.toggle('active', viewName === 'checkin');
            document.getElementById('btn-view-workout').classList.toggle('active', viewName === 'workout');
        }

        // --- ORQUESTRADOR DE TREINO ---
        function generateId() { return Math.random().toString(36).substr(2, 9); }

        function loadQueues() {
            const saved = localStorage.getItem('spin4all_queues');
            if (saved) return JSON.parse(saved);

            return {
                iniciante: [{ id: generateId(), desc: 'Aquecimento', totalSeconds: 600, remainingSeconds: 600, status: 'green', isRest: false, paused: false }],
                intermediario: [{ id: generateId(), desc: 'Aquecimento', totalSeconds: 600, remainingSeconds: 600, status: 'green', isRest: false, paused: false }],
                avancado: [{ id: generateId(), desc: 'Aquecimento', totalSeconds: 600, remainingSeconds: 600, status: 'green', isRest: false, paused: false }]
            };
        }

        let queues = loadQueues();
        let setupTemp = { desc: '', minutes: 5, level: ['todos'], isRest: false, id: 0 };
        let masterTimerInterval = null;
        let highestRemainingTime = 0; // Para display no timer gigante
        const audioBeep = document.getElementById('audioBeep');
        let isWorkoutPaused = false;
        let isWorkoutRunning = false;

        function saveState() {
            localStorage.setItem('spin4all_queues', JSON.stringify(queues));
        }

        // --- CATALOGO DINAMICO ---
        let catalogItems = JSON.parse(localStorage.getItem('spin4all_catalog')) || [
            { id: generateId(), name: 'Aquecimento', mins: 10, isRest: false, icon: 'fa-running' },
            { id: generateId(), name: 'Multibola Direto', mins: 5, isRest: false, icon: 'fa-bullseye' },
            { id: generateId(), name: 'Mesa a Mesa', mins: 7, isRest: false, icon: 'fa-exchange-alt' },
            { id: generateId(), name: 'Saque e 3ª Bola', mins: 5, isRest: false, icon: 'fa-table-tennis' },
            { id: generateId(), name: 'Partidas (Sets)', mins: 15, isRest: false, icon: 'fa-trophy' },
            { id: generateId(), name: 'Descanso', mins: 2, isRest: true, icon: 'fa-tint' }
        ];

        function renderCatalog() {
            const list = document.getElementById('catalogList');
            list.innerHTML = '';
            catalogItems.forEach(item => {
                const borderRest = item.isRest ? 'border-color: rgba(14, 165, 233, 0.5);' : '';
                const iconRest = item.isRest ? 'color: #38bdf8;' : '';
                const btnIcon = item.icon || 'fa-star';
                list.innerHTML += `
                    <div style="display: flex; gap: 5px; width: 100%;">
                        <button class="catalog-btn" style="flex: 1; text-align: left; padding-left: 15px; ${borderRest}" onclick="openSetupModal('${item.name}', 'Geral', ${item.mins}, ${item.isRest})">
                            <i class="fas ${btnIcon}" style="${iconRest}"></i> ${item.name}
                        </button>
                        <button class="action-btn delete" onclick="deleteCatalogItem('${item.id}')" title="Excluir do Catálogo" style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; width: 45px; color: #fca5a5; cursor:pointer; flex-shrink: 0; transition: all 0.2s;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });
        }

        function deleteCatalogItem(id) {
            catalogItems = catalogItems.filter(c => c.id !== id);
            localStorage.setItem('spin4all_catalog', JSON.stringify(catalogItems));
            renderCatalog();
        }

        // Recuperar se ja estava rodando
        const wasRunning = localStorage.getItem('spin4all_running') === 'true';
        renderCatalog(); // Pinta os cards do catalogo
        if (wasRunning) toggleWorkoutState(); else renderAllQueues();

        // Ao Abrir Modal Avulso
        function openCustomModal() {
            openSetupModal('Personalizado', 'Geral', 5, false);
            document.getElementById('setupType').style.display = 'none';
            document.getElementById('customNameContainer').style.display = 'block';
            document.getElementById('customDescInput').value = '';
            document.getElementById('saveToCatalogCheck').checked = false;
            document.getElementById('customDescInput').focus();
        }

        function openSetupModal(desc, defaultLevel, defaultMins, isRest = false) {
            setupTemp = { id: generateId(), desc, minutes: defaultMins, level: ['todos'], isRest };
            document.getElementById('setupTitle').innerText = isRest ? 'Pausa / Descanso' : 'Adicionar ao Treino';
            document.getElementById('setupType').innerText = desc;

            document.getElementById('setupType').style.display = 'block';
            document.getElementById('customNameContainer').style.display = 'none';

            document.getElementById('setupMinutes').innerText = defaultMins;

            // reset level btns
            document.querySelectorAll('.level-tag').forEach(b => b.classList.remove('active'));
            document.querySelector('.level-tag[data-level="todos"]').classList.add('active');

            document.getElementById('setupOverlay').style.display = 'flex';
        }

        // Setup Events
        function adjustTime(diff) {
            let newTime = setupTemp.minutes + diff;
            if (newTime >= 1 && newTime <= 60) {
                setupTemp.minutes = newTime;
                document.getElementById('setupMinutes').innerText = newTime;
            }
        }

        document.querySelectorAll('.level-tag').forEach(btn => {
            btn.onclick = (e) => {
                const lvl = e.target.dataset.level;
                if (lvl === 'todos') {
                    document.querySelectorAll('.level-tag').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    setupTemp.level = ['todos'];
                } else {
                    document.querySelector('.level-tag[data-level="todos"]').classList.remove('active');
                    e.target.classList.toggle('active');

                    setupTemp.level = Array.from(document.querySelectorAll('.level-tag.active')).map(b => b.dataset.level);

                    if (setupTemp.level.length === 0 || setupTemp.level.length === 3) {
                        document.querySelectorAll('.level-tag').forEach(b => b.classList.remove('active'));
                        document.querySelector('.level-tag[data-level="todos"]').classList.add('active');
                        setupTemp.level = ['todos'];
                    }
                }
            }
        });

        function addToQueue() {
            if (document.getElementById('customNameContainer').style.display === 'block') {
                const customVal = document.getElementById('customDescInput').value.trim();
                setupTemp.desc = customVal || 'Exercício Extra';

                if (document.getElementById('saveToCatalogCheck').checked) {
                    saveToCatalogDB(setupTemp.desc, setupTemp.minutes);
                }
            }

            const levels = setupTemp.level.includes('todos') ? ['iniciante', 'intermediario', 'avancado'] : setupTemp.level;

            levels.forEach(lvl => {
                queues[lvl].push({
                    id: generateId(),
                    desc: setupTemp.desc,
                    totalSeconds: setupTemp.minutes * 60,
                    remainingSeconds: setupTemp.minutes * 60,
                    status: 'green',
                    isRest: setupTemp.isRest,
                    paused: false
                });
            });

            closeModals();
            saveState();
            renderAllQueues();
        }

        function removePlaycard(level, id) {
            queues[level] = queues[level].filter(p => p.id !== id);
            saveState();
            renderQueue(level);
        }

        function fastForwardCard(level, id) {
            const card = queues[level].find(p => p.id === id);
            if (card && card.status === 'yellow') {
                card.remainingSeconds = 1; // Forca a terminar no proximo tick
            }
        }

        function saveToCatalogDB(nome, tempo) {
            console.log("Salvando no DB Tb_treinos_catalogo: ", nome, tempo);
            catalogItems.push({ id: generateId(), name: nome, mins: tempo, isRest: false, icon: 'fa-star' });
            localStorage.setItem('spin4all_catalog', JSON.stringify(catalogItems));
            renderCatalog();
        }

        function adjustRunningTime(level, id) {
            const card = queues[level].find(p => p.id === id);
            if (card && card.status === 'yellow') {
                const addMins = prompt(`Ajustar Tempo de "${card.desc}": \nDigite os minutos a ADICIONAR ou REMOVER (use sinal negativo para remover. Ex: -1):`);
                if (addMins !== null && addMins.trim() !== '') {
                    const val = parseInt(addMins);
                    if (!isNaN(val)) {
                        card.remainingSeconds += val * 60;
                        if (card.remainingSeconds < 1) card.remainingSeconds = 1;
                        card.totalSeconds += val * 60;
                        saveState();
                        renderQueue(level);
                        // forca master tick atualizar visualmente agora
                        const secs = Math.max(...['iniciante', 'intermediario', 'avancado'].map(l => {
                            const y = queues[l].find(q => q.status === 'yellow');
                            return y ? y.remainingSeconds : 0;
                        }));
                        updateMasterDisplay(secs, card.isRest);
                    }
                }
            }
        }

        function clearQueue(level) {
            if (confirm(`Tem certeza que deseja zerar a fila de treino do nível ${level.toUpperCase()}?`)) {
                queues[level] = [];
                saveState();
                renderQueue(level);
            }
        }

        function toggleCardPause(level, id) {
            const card = queues[level].find(p => p.id === id);
            if (card && card.status === 'yellow') {
                card.paused = !card.paused;
                saveState();
                renderQueue(level);
            }
        }

        function renderAllQueues() {
            renderQueue('iniciante');
            renderQueue('intermediario');
            renderQueue('avancado');
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function renderQueue(level) {
            const col = document.getElementById(`list-${level}`);
            col.innerHTML = '';

            queues[level].forEach(item => {
                let statusClass = item.status === 'yellow' && item.isRest ? 'status-rest' : `status-${item.status}`;
                let actionBtns = '';

                if (item.status === 'green') {
                    actionBtns = `<button class="action-btn delete" title="Remover" onclick="removePlaycard('${level}', '${item.id}')"><i class="fas fa-times"></i></button>`;
                } else if (item.status === 'yellow') {
                    const pauseIcon = item.paused ? 'fa-play' : 'fa-pause';
                    const pauseTitle = item.paused ? 'Retomar' : 'Pausar';
                    const pauseClass = item.paused ? 'resume' : 'pause';

                    actionBtns = `
                        <button class="action-btn edit-time" title="Ajustar Tempo Agora (+/-)" onclick="adjustRunningTime('${level}', '${item.id}')" style="margin-right: -4px;"><i class="fas fa-pen"></i></button>
                        <button class="action-btn ${pauseClass}" title="${pauseTitle}" onclick="toggleCardPause('${level}', '${item.id}')" style="margin-right: -4px;"><i class="fas ${pauseIcon}"></i></button>
                        <button class="action-btn finish" title="Concluir Imediatamente" onclick="fastForwardCard('${level}', '${item.id}')"><i class="fas fa-forward"></i></button>
                    `;
                }

                // Calcular altura proporcional
                const baseMins = item.totalSeconds / 60;
                let addedPadding = Math.min((baseMins * 3), 70);
                let finalPadding = 1.2 + (addedPadding / 16);

                const pausedClass = item.paused ? 'is-paused' : '';

                col.innerHTML += `
                    <div class="playcard ${statusClass} ${pausedClass}" style="padding-bottom: ${finalPadding}rem;">
                        <div class="desc">${item.desc}</div>
                        <div class="time"><i class="fas fa-clock"></i> ${formatTime(item.remainingSeconds)}</div>
                        <div class="card-actions">${actionBtns}</div>
                    </div>
                `;
            });
        }

        // MAQUINA DE ESTADO START/PAUSE/RESUME
        function toggleWorkoutState() {
            const btn = document.getElementById('btnStartAll');
            const timerEl = document.getElementById('masterTimer');
            const timerLabel = document.getElementById('masterTimerLabel');

            if (!isWorkoutRunning) {
                // START (from zero)
                // Checar se tem tasks green ou yellow pra rodar
                const hasTasks = ['iniciante', 'intermediario', 'avancado'].some(lvl =>
                    queues[lvl].some(q => q.status === 'green' || q.status === 'yellow')
                );

                if (!hasTasks) {
                    alert("Não há exercícios engatilhados na fila. Adicione algo do catálogo primeiro.");
                    return;
                }

                isWorkoutRunning = true;
                isWorkoutPaused = false;
                localStorage.setItem('spin4all_running', 'true');
                startAllQueuesLogic();
                btn.innerHTML = '<i class="fas fa-pause"></i> Em Andamento';
                btn.style.background = '#eab308';
                timerLabel.innerText = "TREINO EM ANDAMENTO";
                timerEl.classList.remove('paused');
            } else if (!isWorkoutPaused) {
                // PAUSE IT
                isWorkoutPaused = true;
                localStorage.setItem('spin4all_running', 'false');
                clearInterval(masterTimerInterval);
                btn.innerHTML = '<i class="fas fa-play"></i> Continuar Treino';
                btn.style.background = '#38bdf8';
                timerLabel.innerText = "TREINO PAUSADO";
                timerEl.classList.add('paused');
            } else {
                // RESUME IT
                isWorkoutPaused = false;
                localStorage.setItem('spin4all_running', 'true');
                masterTimerInterval = setInterval(tickAll, 1000);
                btn.innerHTML = '<i class="fas fa-pause"></i> Em Andamento';
                btn.style.background = '#eab308';
                timerLabel.innerText = "TREINO EM ANDAMENTO";
                timerEl.classList.remove('paused');
            }
        }

        function startAllQueuesLogic() {
            ['iniciante', 'intermediario', 'avancado'].forEach(level => {
                if (!queues[level].find(q => q.status === 'yellow')) {
                    const firstGreen = queues[level].find(q => q.status === 'green');
                    if (firstGreen) firstGreen.status = 'yellow';
                }
            });
            renderAllQueues();
            if (masterTimerInterval) clearInterval(masterTimerInterval);
            masterTimerInterval = setInterval(tickAll, 1000);
        }

        function tickAll() {
            let activeTasks = false;
            let lowestSecs = null;
            let isGlobalRest = true;

            ['iniciante', 'intermediario', 'avancado'].forEach(level => {
                const active = queues[level].find(q => q.status === 'yellow');
                if (active) {
                    activeTasks = true;
                    if (!active.isRest) isGlobalRest = false;

                    if (!isWorkoutPaused && !active.paused) {
                        active.remainingSeconds--;
                    }

                    if (lowestSecs === null || active.remainingSeconds < lowestSecs) {
                        lowestSecs = active.remainingSeconds;
                    }

                    // Checa Fim do Exce
                    if (active.remainingSeconds <= 0) {
                        active.status = 'red'; // Fim
                        recordWorkoutHistory(active.desc, level, active.totalSeconds / 60);

                        // Puxar proximo
                        const nextGreen = queues[level].find(q => q.status === 'green');
                        if (nextGreen) nextGreen.status = 'yellow';
                    }
                }
            });

            if (!activeTasks) {
                clearInterval(masterTimerInterval);
                isWorkoutRunning = false;
                isWorkoutPaused = false;
                localStorage.removeItem('spin4all_running');
                localStorage.removeItem('spin4all_queues'); // Reseta
                const timerLabel = document.getElementById('masterTimerLabel');
                timerLabel.innerText = "TREINO FINALIZADO";
                document.getElementById('masterTimer').innerText = "00:00";
                document.getElementById('masterTimer').className = "massive-timer ending";
                document.getElementById('btnStartAll').innerHTML = '<i class="fas fa-check"></i> Treino Finalizado';
                document.getElementById('btnStartAll').style.background = '#4ade80';
                return;
            }

            saveState();
            renderAllQueues();
            updateMasterDisplay(lowestSecs === null ? 0 : lowestSecs, isGlobalRest);
        }

        function updateMasterDisplay(secs, isRest) {
            const masterTimer = document.getElementById('masterTimer');
            const timerLabel = document.getElementById('masterTimerLabel');

            masterTimer.innerText = formatTime(secs);

            if (secs <= 3 && secs > 0) {
                masterTimer.className = 'massive-timer ending';
                timerLabel.innerText = "ATENÇÃO!";
                audioBeep.pause();
                audioBeep.currentTime = 0;
                audioBeep.play().catch(e => console.log('Audio error:', e));
            } else if (secs === 0) {
                // Beep Longo Fim
                masterTimer.className = 'massive-timer ending';
                timerLabel.innerText = "FIM / TROCA";
            } else if (isRest) {
                masterTimer.className = 'massive-timer rest';
                timerLabel.innerText = "DESCANSO / PAUSA EM ANDAMENTO";
            } else {
                masterTimer.className = 'massive-timer';
                timerLabel.innerText = "PRÓXIMA TROCA EM:";
            }
        }

        async function recordWorkoutHistory(desc, level, mins) {
            console.log(`[DB Sim] Gravado Treino Executado: ${desc} | ${level} | ${mins}min`);
            // FUTURO: fetch POST /api/admin/workout-exec ...
        }

        async function checkAdmin() {
            const token = localStorage.getItem('spin4all_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (!data.success || !data.user.flg_admin) {
                    alert('Acesso restrito: Apenas administradores podem lançar o sistema de check-in.');
                    window.location.href = 'dashboard.html';
                    return;
                }

                init();
            } catch (err) {
                window.location.href = 'dashboard.html';
            }
        }

        async function init() {
            fetchMembers();
        }

        let allMembers = [];
        let selectedMember = null;

        function getCheckinTime(userId) {
            const times = JSON.parse(localStorage.getItem('spin4all_checkin_times') || '{}');
            return times[userId];
        }

        function setCheckinTime(userId) {
            const times = JSON.parse(localStorage.getItem('spin4all_checkin_times') || '{}');
            const now = new Date();
            times[userId] = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            localStorage.setItem('spin4all_checkin_times', JSON.stringify(times));
        }

        function removeCheckinTime(userId) {
            const times = JSON.parse(localStorage.getItem('spin4all_checkin_times') || '{}');
            delete times[userId];
            localStorage.setItem('spin4all_checkin_times', JSON.stringify(times));
        }

        async function fetchMembers() {
            const token = localStorage.getItem('spin4all_token');
            try {
                const response = await fetch(`${API_URL}/checkin-list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    allMembers = data.members;
                    console.log("--- DEBUG RAW DATA ---");
                    if (allMembers.length > 0) console.log("Primeiro membro:", allMembers[0]);
                    renderMembers(allMembers);
                }
            } catch (err) {
                console.error("Erro ao carregar membros:", err);
            }
        }

        function renderMembers(members) {
            console.log("--- DEBUG RENDER MEMBERS ---");
            console.table(members.map(m => ({ nome: m.dsc_nome_completo, foto: m.dsc_foto_perfil })));
            
            const grid = document.getElementById('membersGrid');
            const presentList = document.getElementById('presentList');
            const countLabel = document.getElementById('presentCount');
            
            grid.innerHTML = '';
            presentList.innerHTML = '';
            let pCount = 0;

            // Separar listas para aplicar ordenações diferentes se necessário
            const present = members.filter(m => m.flg_presente);
            const absent = members.filter(m => !m.flg_presente);

            // Ordenar ausentes por frequência (quem treina mais no topo) e depois nome
            absent.sort((a, b) => {
                if ((b.qtd_presenca || 0) !== (a.qtd_presenca || 0)) {
                    return (b.qtd_presenca || 0) - (a.qtd_presenca || 0);
                }
                return a.dsc_nome_completo.localeCompare(b.dsc_nome_completo);
            });

            // Ordenar presentes por nome (ou se preferir, poderia ser por hora de chegada)
            present.sort((a, b) => a.dsc_nome_completo.localeCompare(b.dsc_nome_completo));

            const allToRender = [...present, ...absent];

            allToRender.forEach(m => {
                const initials = m.dsc_nome_completo.split(' ').filter(n => n.length > 2).map(n => n[0]).join('').substring(0, 2);
                
                // Helper para gerar o HTML do avatar (com foto ou iniciais)
                const avatarHtml = m.dsc_foto_perfil 
                    ? `<div class="avatar"><img src="${m.dsc_foto_perfil}?t=${new Date().getTime()}" alt="${m.dsc_nome_completo}"></div>`
                    : `<div class="avatar">${initials || m.dsc_nome_completo[0]}</div>`;

                if (m.flg_presente) {
                    pCount++;
                    const card = document.createElement('div');
                    card.className = 'playlist-card';
                    
                    const time = getCheckinTime(m.id_usuario) || "--:--"; 

                    card.innerHTML = `
                        ${avatarHtml}
                        <div class="info">
                            <span class="name">${m.dsc_nome_completo}</span>
                            <span class="time-entry"><i class="far fa-clock" style="margin-right:4px;"></i> CHEGOU ÀS ${time}</span>
                        </div>
                    `;
                    card.onclick = () => handleCardClick(m);
                    presentList.appendChild(card);
                } else {
                    const card = document.createElement('div');
                    card.className = 'member-card';
                    card.innerHTML = `
                        ${avatarHtml}
                        <div class="member-name">${m.dsc_nome_completo}</div>
                    `;
                    card.onclick = () => handleCardClick(m);
                    grid.appendChild(card);
                }
            });

            if (countLabel) countLabel.innerText = pCount;
        }

        function handleCardClick(member) {
            selectedMember = member;
            const firstName = member.dsc_nome_completo.split(' ')[0];

            if (member.flg_presente) {
                document.getElementById('undoTitle').textContent = `Oi, ${firstName}!`;
                document.getElementById('undoOverlay').style.display = 'flex';
                document.getElementById('btnUndo').onclick = () => doUndo(member.id_usuario);
            } else {
                document.getElementById('confirmTitle').textContent = `Você é o ${firstName}?`;
                document.getElementById('confirmOverlay').style.display = 'flex';
                document.getElementById('btnConfirm').onclick = () => doCheckin(member.id_usuario, member.dsc_nome_completo);
            }
        }

        function closeModals() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            selectedMember = null;
        }

        async function doCheckin(userId, fullName) {
            const token = localStorage.getItem('spin4all_token');
            closeModals();
            try {
                const response = await fetch(`${API_URL}/checkin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id_usuario: userId })
                });

                const data = await response.json();
                showFeedback(data.success, fullName, data.message);
                if (data.success) {
                    setCheckinTime(userId);
                    fetchMembers();
                }
            } catch (error) {
                showFeedback(false, "Erro", "Houve um problema com a conexão.");
            }
        }

        async function doUndo(userId) {
            const token = localStorage.getItem('spin4all_token');
            closeModals();
            try {
                const response = await fetch(`${API_URL}/checkin`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id_usuario: userId })
                });

                const data = await response.json();
                showFeedback(data.success, "Corrigido", data.message);
                if (data.success) {
                    removeCheckinTime(userId);
                    fetchMembers();
                }
            } catch (error) {
                showFeedback(false, "Erro", "Houve um problema com a conexão.");
            }
        }

        function showFeedback(success, fullName, msg) {
            const overlay = document.getElementById('successOverlay');
            const fbName = document.getElementById('feedback-name');
            const fbMsg = document.getElementById('feedback-msg');
            const icon = overlay.querySelector('i');

            fbName.textContent = success ? `Legal, ${fullName.split(' ')[0]}!` : "Opa!";
            fbMsg.textContent = msg;
            icon.className = success ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            icon.style.color = success ? '#4ade80' : '#f87171';

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('memberSearch').value = '';
            }, 2500);
        }

        // Filtro de Busca
        document.getElementById('memberSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allMembers.filter(m =>
                m.dsc_nome_completo.toLowerCase().includes(term)
            );
            renderMembers(filtered);
        });

        // Inicializar com proteção
        checkAdmin();
    </script>
</body>
