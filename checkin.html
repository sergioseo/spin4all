<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in | Spin4All</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem; /* Aumentado padding superior */
            font-family: 'Outfit', sans-serif;
            color: #fff;
            margin: 0;
        }

        .checkin-header {
            text-align: center;
            margin-bottom: 4rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Aumentado gap entre título e subtítulo */
            position: relative; /* Garante que segue o fluxo normal */
        }

        .checkin-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
            color: #fff; /* Força a cor branca para o 'Spin' */
        }

        .checkin-header h1 span { color: #38bdf8; }
        
        .checkin-header .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #64748b;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
            position: relative;
            z-index: 10; /* Garante que não fique atrás de nada */
        }

        .search-container input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.8); /* Fundo mais sólido */
            color: #fff;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #38bdf8;
            font-size: 1.2rem;
        }

        /* Grid de Membros */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            overflow-y: auto;
            padding: 0.5rem 0.5rem 3rem 0.5rem;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .member-card:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            transform: translateY(-5px);
        }

        .member-card.present {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.05);
        }

        .member-card.present::after {
            content: "\f058";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 10px;
            color: #4ade80;
            font-size: 1.2rem;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .member-card.present .avatar {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.3);
        }

        .member-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #1e293b;
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-card h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-yes { background: #38bdf8; color: #fff; }
        .btn-no { background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-undo { background: #ef4444; color: #fff; }

        .btn:active { transform: scale(0.95); }

        /* Feedback Card specific */
        .feedback-card i {
            font-size: 4rem;
            color: #4ade80;
            margin-bottom: 1.5rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.3); }

    </style>
</head>
<body>

    <header class="checkin-header">
        <h1>Spin<span>4All</span></h1>
        <div class="subtitle">CHECK-IN PRESENCIAL</div>
    </header>

    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="memberSearch" placeholder="Quem está treinando agora?">
    </div>

    <div class="members-grid" id="membersGrid">
        <!-- Membros via JS -->
    </div>

    <!-- Confirmation Overlay -->
    <div id="confirmOverlay" class="overlay">
        <div class="modal-card">
            <h2 id="confirmTitle">Você é Sergio?</h2>
            <div class="modal-actions">
                <button class="btn btn-no" onclick="closeModals()">NÃO</button>
                <button id="btnConfirm" class="btn btn-yes">SIM, SOU EU</button>
            </div>
        </div>
    </div>

    <!-- Undo Overlay -->
    <div id="undoOverlay" class="overlay">
        <div class="modal-card">
            <h2 id="undoTitle">Olá Sergio!</h2>
            <p style="color: #94a3b8; margin-bottom: 2rem;">Sua presença já está marcada.</p>
            <div class="modal-actions">
                <button class="btn btn-no" onclick="closeModals()">FECHAR</button>
                <button id="btnUndo" class="btn btn-undo">DESMARCAR PRESENÇA</button>
            </div>
        </div>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="successOverlay" class="overlay">
        <div class="modal-card feedback-card">
            <i class="fas fa-check-circle"></i>
            <h2 id="feedback-name">Olá!</h2>
            <p id="feedback-msg">Presença confirmada!</p>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : 'https://spin4all-motor.h5rvsp.easypanel.host/api';

        async function checkAdmin() {
            const token = localStorage.getItem('spin4all_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.success || !data.user.flg_admin) {
                    alert('Acesso restrito: Apenas administradores podem lançar o sistema de check-in.');
                    window.location.href = 'dashboard.html';
                    return;
                }

                init();
            } catch (err) {
                window.location.href = 'dashboard.html';
            }
        }

        async function init() {
            fetchMembers();
        }

        let allMembers = [];
        let selectedMember = null;

        async function fetchMembers() {
            try {
                const response = await fetch(`${API_URL}/checkin-list`);
                const data = await response.json();
                if (data.success) {
                    allMembers = data.members;
                    renderMembers(allMembers);
                }
            } catch (err) {
                console.error("Erro ao carregar membros:", err);
            }
        }

        function renderMembers(members) {
            const grid = document.getElementById('membersGrid');
            grid.innerHTML = '';

            members.forEach(m => {
                const initials = m.dsc_nome_completo.split(' ').filter(n => n.length > 2).map(n => n[0]).join('').substring(0, 2);
                const card = document.createElement('div');
                card.className = `member-card ${m.flg_presente ? 'present' : ''}`;
                card.innerHTML = `
                    <div class="avatar">${initials || m.dsc_nome_completo[0]}</div>
                    <div class="member-name">${m.dsc_nome_completo}</div>
                `;
                card.onclick = () => handleCardClick(m);
                grid.appendChild(card);
            });
        }

        function handleCardClick(member) {
            selectedMember = member;
            const firstName = member.dsc_nome_completo.split(' ')[0];
            
            if (member.flg_presente) {
                document.getElementById('undoTitle').textContent = `Oi, ${firstName}!`;
                document.getElementById('undoOverlay').style.display = 'flex';
                document.getElementById('btnUndo').onclick = () => doUndo(member.id_usuario);
            } else {
                document.getElementById('confirmTitle').textContent = `Você é o ${firstName}?`;
                document.getElementById('confirmOverlay').style.display = 'flex';
                document.getElementById('btnConfirm').onclick = () => doCheckin(member.id_usuario, member.dsc_nome_completo);
            }
        }

        function closeModals() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            selectedMember = null;
        }

        async function doCheckin(userId, fullName) {
            closeModals();
            try {
                const response = await fetch(`${API_URL}/checkin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_usuario: userId })
                });

                const data = await response.json();
                showFeedback(data.success, fullName, data.message);
                if (data.success) fetchMembers();
            } catch (error) {
                showFeedback(false, "Erro", "Houve um problema com a conexão.");
            }
        }

        async function doUndo(userId) {
            closeModals();
            try {
                const response = await fetch(`${API_URL}/checkin`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_usuario: userId })
                });

                const data = await response.json();
                showFeedback(data.success, "Corrigido", data.message);
                if (data.success) fetchMembers();
            } catch (error) {
                showFeedback(false, "Erro", "Houve um problema com a conexão.");
            }
        }

        function showFeedback(success, fullName, msg) {
            const overlay = document.getElementById('successOverlay');
            const fbName = document.getElementById('feedback-name');
            const fbMsg = document.getElementById('feedback-msg');
            const icon = overlay.querySelector('i');

            fbName.textContent = success ? `Legal, ${fullName.split(' ')[0]}!` : "Opa!";
            fbMsg.textContent = msg;
            icon.className = success ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            icon.style.color = success ? '#4ade80' : '#f87171';

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('memberSearch').value = '';
            }, 2500);
        }

        // Filtro de Busca
        document.getElementById('memberSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allMembers.filter(m => 
                m.dsc_nome_completo.toLowerCase().includes(term)
            );
            renderMembers(filtered);
        });

        // Inicializar com proteção
        checkAdmin();
    </script>
</body>
</html>
