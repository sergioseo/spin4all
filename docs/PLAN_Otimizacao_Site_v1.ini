# 🔄 4. Pipeline de Dados

## Fluxo Principal

```
RAW → CLEAN → METRICS → AGGREGATION → AI → OUTPUT
```

---

## 🔹 Fase 0 — Sanitização

Responsável por:

* Remover duplicatas
* Validar integridade
* Corrigir inconsistências

### Exemplo

```sql
DELETE FROM matches
WHERE sets_won > 3;
```

---

## 🔹 Fase 1 — Métricas (Determinístico)

Calcular:

* Win rate
* Consistência
* Frequência
* Volume de jogos

---

## 🔹 Fase 2 — Agregação

Transformar dados brutos em estrutura compacta:

```json
{
  "win_rate": 0.67,
  "matches": 32,
  "consistency_score": 78
}
```

---

## 🔹 Fase 3 — IA

Entrada mínima para LLM:

```json
{
  "player_level": "intermediate",
  "metrics": {},
  "focus": "consistency"
}
```

---

## 🔹 Fase 4 — Output

```json
{
  "headline": "",
  "insight": "",
  "recommendation": ""
}
```

---

# 🤖 5. Camada de IA

## Estrutura

```
/ai
  /prompts
  /schemas
  /agents
  /orchestrator
```

---

## Modelo de Agentes

| Agente    | Função              | Modelo sugerido  |
| --------- | ------------------- | ---------------- |
| Planner   | Interpretação       | Flash / Planning |
| Generator | Geração de conteúdo | Pro              |
| Validator | Validação           | Flash            |

---

## Regras

* Sempre JSON estruturado
* Schema obrigatório
* Sem texto livre

---

# 💾 6. Data Layer

## Postgres

Tabelas principais:

```sql
users
matches
player_metrics
aggregated_metrics
ai_outputs
```

---

## Cache (Redis recomendado)

### Usos:

* Cache de métricas
* Cache de IA
* Evitar recomputação

---

## Estratégia de Cache

```
input_hash = hash(metrics + contexto)
```

Se existir:
→ retorna direto (sem IA)

---

# ⚙️ 7. Filas e Processamento

## Stack sugerida

* BullMQ ou RabbitMQ

---

## Casos de uso

* Processamento de métricas
* Geração de insights
* Reprocessamento em lote

---

# 🌐 8. Frontend

## Regra principal

Frontend NÃO depende da IA diretamente.

✔️ Consome dados já processados

