<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Membro | Spin4All</title>
    <!-- CSS Foundation -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    
    <!-- UI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- App Bootstrap -->
    <script type="module" src="app.js?v=7732"></script>
    <script src="js/diagnostic.js?v=7732"></script>
</head>

<body>
    <!-- SIDEBAR (SHELL) -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="assets/images/logo.png" alt="Spin4All Logo" style="height: 42px; width: auto; object-fit: contain;">
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navTo('home')" class="nav-link active" id="nav-home">
                        <i class="fas fa-home"></i> <span>Início</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navTo('profile')" class="nav-link" id="nav-profile">
                        <i class="fas fa-user"></i> <span>Meu Perfil</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="checkin.html" class="nav-link">
                        <i class="fas fa-calendar-check"></i> <span>Check-In</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="torneios.html" class="nav-link">
                        <i class="fas fa-trophy"></i> <span>Painel do Torneio</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navTo('settings')" class="nav-link" id="nav-settings">
                        <i class="fas fa-cog"></i> <span>Configurações</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="openProfileModal()" class="nav-link" style="color: var(--accent-cyan); font-weight: 700;">
                        <i class="fas fa-brain"></i> <span>Formulário Inicial</span>
                    </a>
                </li>
                <li class="nav-item" id="admin-monitoring-nav" style="display: none;">
                    <a href="/monitoring.html" class="nav-link" style="color: #00d2ff;">
                        <i class="fas fa-satellite-dish"></i> <span>Monitoramento AI</span>
                    </a>
                </li>
                <li class="nav-item" id="admin-nav-item" style="display: none;">
                    <a href="admin.html" class="nav-link">
                        <i class="fas fa-shield-alt"></i> <span>Admin</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer" style="margin-top: auto; padding: 15px;">
            <a href="javascript:void(0)" onclick="logout()" class="nav-link" style="color: #e05555;">
                <i class="fas fa-sign-out-alt"></i> <span>Sair</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="layout-container">
            
            <!-- WRAPPER DE ALINHAMENTO GLOBAL (TICO) -->
            <div class="elite-layout-wrapper" style="max-width: 1080px; margin-left: 30px;">
                
                <!-- HEADER (v12:10 Style) -->
                <div class="header-split-container" style="display: flex; gap: 14px; margin-bottom: 40px; height: 110px;">
                    <!-- CARD ESQUERDO: SAUDAÇÃO (FIEL À IMAGEM 1) -->
                    <div class="glass-card header-card-left"
                        style="flex: 0 0 calc(25% - 7px); display: flex; align-items: center; padding: 0 15px; background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; position: relative; overflow: hidden; margin: 0;">
                        <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
                            <div id="user-profile-img-container" 
                                style="width: 48px; height: 48px; border-radius: 50%; border: 2px solid #38bdf8; overflow: hidden; background: #1e293b; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative;">
                                <i class="fas fa-user" id="user-photo-placeholder" style="color: #94a3b8; font-size: 1.2rem;"></i>
                                <img id="user-photo-img" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            </div>
                            <div class="user-greeting">
                                <h1 id="user-welcome" style="font-size: 0.95rem; color: #fff; margin: 0; font-weight: 700;">Olá!</h1>
                                 <span id="user-email" style="font-size: 0.5rem; color: #38bdf8; opacity: 0.8; font-weight: 500;">Carregando...</span>
                                
                                <!-- Badges integrados no fluxo ou absolutos -->
                                <div class="badge-group" style="position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                                    <div id="user-level-badge" style="font-weight: 800; color: #00e5ff; text-transform: uppercase; font-size: 7px; border: 1px solid #00e5ff; padding: 1px 6px; border-radius: 4px; letter-spacing: 0.5px;">--</div>
                                    <div id="admin-badge" class="badge-admin" style="display: none; font-size: 7px; font-weight: 900; color: #fbbf24; border: 1px solid #fbbf24; padding: 1px 6px; border-radius: 4px; text-transform: uppercase;">ADMIN</div>
                                </div>
                                
                                <div class="xp-mini-bar" style="width: 140px; margin-top: 8px;">
                                    <div style="background: rgba(255,255,255,0.05); height: 3px; border-radius: 2px; overflow: hidden;">
                                        <div id="user-xp-progress-bar" style="background: #38bdf8; width: 0%; height: 100%; transition: width 0.3s;"></div>
                                    </div>
                                    <div style="font-size: 7px; color: #fff; margin-top: 3px; font-weight: 800;">XP <span id="user-xp-val">0</span>/1000</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- CARD DIREITO: BANNER DE PATROCINADORES -->
                    <div class="glass-card header-card-right"
                        style="flex: 1; margin: 0; padding: 0; background: rgba(10, 26, 46, 0.6); border: 1.5px solid rgba(56, 189, 248, 0.2); border-radius: 20px; overflow: hidden; position: relative;">
                        <div id="sponsor-carousel" style="width: 100%; height: 100%; position: relative;">
                            <!-- Slides injetados via JS -->
                        </div>
                    </div>
                </div>

                <!-- CONTEÚDO DINÂMICO (Injection Point) -->
                <div id="app" style="padding-bottom: 50px;">
                    <!-- Carregado via js/utils/dom.js -->
                </div>

            </div>

        </div>
    </main>

    <!-- Modal Perfil Bio-Mecânico (Formulário Inicial) -->
    <div id="initial-profile-modal" class="modal" style="display: none;">
        <div class="modal-card" style="max-width: 500px; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(56, 189, 248, 0.2);">
            <div class="modal-header" style="margin-bottom: 24px; text-align: center;">
                <h2 style="color: #fff; font-size: 1.5rem; font-weight: 800; margin-bottom: 8px;">Dados do Atleta</h2>
                <p style="color: #94a3b8; font-size: 0.9rem;">Complete ou atualize seu perfil biomecânico</p>
            </div>

            <form id="initial-profile-form">
                <div class="input-group" style="margin-bottom: 18px;">
                    <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 6px;">Nome Completo</label>
                    <input type="text" id="profile-name" placeholder="Seu nome completo" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px;">
                    <div class="input-group">
                        <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 6px;">Altura (cm)</label>
                        <input type="number" id="profile-height" placeholder="Ex: 175" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;" required>
                    </div>
                    <div class="input-group">
                        <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 6px;">Peso (kg)</label>
                        <input type="number" id="profile-weight" placeholder="Ex: 72" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                    <div class="input-group">
                        <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 6px;">Nascimento</label>
                        <input type="date" id="profile-birth" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;" required>
                    </div>
                    <div class="input-group">
                        <label style="color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 6px;">Telefone</label>
                        <input type="tel" id="profile-phone" placeholder="(00) 00000-0000" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;" required>
                    </div>
                </div>

                <div class="modal-actions" style="display: flex; gap: 12px;">
                    <button type="button" onclick="closeProfileModal()" class="btn-cancel" style="flex: 1; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer;">Cancelar</button>
                    <button type="submit" id="btn-save-profile" class="btn-primary" style="flex: 2; padding: 12px; border-radius: 8px; background: #38bdf8; border: none; color: #fff; font-weight: 700; cursor: pointer;">Salvar Perfil</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Diagnóstico (Mantido) -->
    <div id="diagnostic-modal" class="modal" style="display: none;">
        <!-- ... (Diagnostic code preserved) -->
    </div>

</body>
</html>
