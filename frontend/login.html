<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Membro | Spin4All</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --brand-primary: #38bdf8;
            --brand-dark: #0f172a;
            --brand-bg: #f8fafc;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            width: 70px;
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: 1.5rem;
            color: var(--brand-dark);
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .auth-subtitle {
            color: #64748b;
            font-size: 0.95rem;
        }

        /* Forms */
        .auth-step { display: none; }
        .auth-step.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #fff;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--brand-primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        /* Buttons */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: #fff;
            color: #1f2937;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            margin-bottom: 24px;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-google:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            transform: translateY(-1px);
        }

        .btn-primary {
            width: 100%;
            background: var(--brand-primary);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: #64748b;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider span { padding: 0 12px; }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #fee2e2;
        }

        .google-info-hint {
            background: #f0f9ff;
            color: #0369a1;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e0f2fe;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 24px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <img src="/assets/images/logo.png" alt="Spin4All Logo" class="auth-logo">
                <h1 id="main-title" class="auth-title">Entre ou crie sua conta para começar sua evolução</h1>
            </div>

            <div id="login-error" class="error-msg"></div>

            <!-- STEP 1: LOGIN SELECTION -->
            <div id="step-selection" class="auth-step active">
                <button onclick="handleGoogleLogin()" class="btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continuar com Google
                </button>

                <div class="divider"><span>ou</span></div>

                <form id="email-login-form">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="login-email" placeholder="exemplo@email.com" required>
                    </div>
                    <div class="input-group" style="margin-bottom: 12px;">
                        <label>Senha</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <div style="text-align: right; margin-bottom: 24px;">
                        <button type="button" class="btn-ghost" style="font-size: 0.8rem; font-weight: 500;">Esqueci minha senha</button>
                    </div>
                    <button type="submit" id="btn-login-submit" class="btn-primary">Entrar no Portal</button>
                </form>

                <div style="text-align: center; margin-top: 32px;">
                    <p style="color: #64748b; font-size: 0.9rem;">
                        Ainda não faz parte? 
                        <button onclick="goToStep('profile')" class="btn-ghost" style="color: var(--brand-primary); font-weight: 700;">Criar Minha Conta</button>
                    </p>
                </div>
            </div>

            <!-- STEP 2: BIO-MECHANICAL PROFILE -->
            <div id="step-profile" class="auth-step">
                <div id="google-hint" class="google-info-hint" style="display: none;">
                    <i class="ph-fill ph-info"></i>
                    Preenchido via Google — revise se necessário
                </div>
                
                <form id="profile-form">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="reg-name" placeholder="Seu nome completo" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="reg-email" placeholder="email@exemplo.com" required>
                    </div>
                    <div class="input-group" id="pass-group">
                        <label>Senha</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="input-group">
                            <label>Altura (cm)</label>
                            <input type="number" id="reg-height" placeholder="Ex: 175" required>
                        </div>
                        <div class="input-group">
                            <label>Peso (kg)</label>
                            <input type="number" id="reg-weight" placeholder="Ex: 72" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="input-group">
                            <label>Nascimento</label>
                            <input type="date" id="reg-birth" required>
                        </div>
                        <div class="input-group">
                            <label>Telefone</label>
                            <input type="tel" id="reg-phone" placeholder="(00) 00000-0000" required>
                        </div>
                    </div>

                    <button type="submit" id="btn-reg-submit" class="btn-primary" style="margin-top: 12px;">Finalizar e Entrar</button>
                    <button type="button" onclick="goToStep('selection')" class="btn-ghost" style="width: 100%; margin-top: 16px; text-decoration: none;">Voltar ao login</button>
                </form>
            </div>

            <div style="text-align: center;">
                <a href="index.html" class="back-link">
                    <i class="ph ph-arrow-left"></i> Voltar para o site
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        const loginError = document.getElementById('login-error');
        let currentAuthSource = 'email'; // 'email' or 'google'

        // --- NAVIGATION ---
        function goToStep(step) {
            document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
            
            const title = document.getElementById('main-title');
            if(step === 'profile') {
                title.textContent = "Complete seu perfil para começar sua evolução";
            } else {
                title.textContent = "Entre ou crie sua conta para começar sua evolução";
            }
            loginError.style.display = 'none';
        }

        // --- GOOGLE LOGIN (MOCK) ---
        async function handleGoogleLogin() {
            // Em aplicação real, aqui abriria o popup do Google.
            // Para o Onboarding, vamos simular o retorno bem-sucedido.
            
            console.log("[GOOGLE] Iniciando login simulado...");
            
            // Simulação de delay
            const btn = document.querySelector('.btn-google');
            btn.innerHTML = 'Conectando...';
            btn.disabled = true;

            setTimeout(async () => {
                const mockData = {
                    email: "usuario.demo@gmail.com",
                    name: "Usuário Exemplo Google",
                    googleId: "mock_12345"
                };

                try {
                    const res = await fetch(`${API_URL}/google-login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(mockData)
                    });
                    const result = await res.json();

                    if (result.success) {
                        localStorage.setItem('spin4all_token', result.token);
                        
                        if (!result.flg_perfil_concluido) {
                            // Usuário novo ou perfil incompleto -> Abrir form
                            currentAuthSource = 'google';
                            document.getElementById('reg-name').value = result.user.name;
                            document.getElementById('reg-email').value = result.user.email;
                            document.getElementById('reg-email').disabled = true;
                            document.getElementById('pass-group').style.display = 'none';
                            document.getElementById('google-hint').style.display = 'flex';
                            goToStep('profile');
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }
                } catch (err) {
                    showError("Erro na conexão com Google.");
                } finally {
                    btn.innerHTML = 'Continuar com Google';
                    btn.disabled = false;
                }
            }, 800);
        }

        // --- EMAIL LOGIN ---
        document.getElementById('email-login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login-submit');

            btn.disabled = true;
            btn.textContent = 'Autenticando...';
            loginError.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('spin4all_token', result.token);
                    if (!result.flg_perfil_concluido) {
                        // Caso especial: conta existe mas perfil não foi feito
                        document.getElementById('reg-email').value = email;
                        document.getElementById('reg-email').disabled = true;
                        document.getElementById('pass-group').style.display = 'none';
                        goToStep('profile');
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    showError(result.message || "E-mail ou senha incorretos.");
                }
            } catch (err) {
                showError("Erro de servidor.");
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar no Portal';
            }
        };

        // --- PROFILE SUBMISSION (SIGNUP / UPDATE) ---
        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-reg-submit');
            btn.disabled = true;
            btn.textContent = 'Salvando e Criando...';

            const payload = {
                email: document.getElementById('reg-email').value,
                name: document.getElementById('reg-name').value,
                password: document.getElementById('reg-password').value || null,
                profileData: {
                    name: document.getElementById('reg-name').value,
                    height: parseInt(document.getElementById('reg-height').value),
                    weight: parseInt(document.getElementById('reg-weight').value),
                    birthDate: document.getElementById('reg-birth').value,
                    phone: document.getElementById('reg-phone').value
                }
            };

            try {
                // Se o usuário veio pelo login (ja tem token em localStorage), usamos a rota de update
                // Se é novo sem token, usamos a rota de register
                const token = localStorage.getItem('spin4all_token');
                
                if (token) {
                    // Update / Complete Profile
                    const res = await fetch(`${API_URL}/update-profile`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            name: payload.profileData.name,
                            height: payload.profileData.height,
                            weight: payload.profileData.weight,
                            birth: payload.profileData.birthDate,
                            phone: payload.profileData.phone
                        })
                    });
                    const result = await res.json();
                    if (result.success) window.location.href = 'dashboard.html';
                    else showError(result.message || "Erro ao salvar perfil.");
                } else {
                    // Novo Registro
                    const res = await fetch(`${API_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if (result.success) {
                        // Faz login automático após registro
                        const loginRes = await fetch(`${API_URL}/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: payload.email, password: payload.password })
                        });
                        const loginResult = await loginRes.json();
                        localStorage.setItem('spin4all_token', loginResult.token);
                        window.location.href = 'dashboard.html';
                    } else {
                        showError(result.error || "Erro ao criar conta.");
                    }
                }
            } catch (err) {
                showError("Erro na comunicação.");
            } finally {
                btn.disabled = false;
                btn.textContent = 'Finalizar e Entrar';
            }
        };

        function showError(msg) {
            loginError.textContent = msg;
            loginError.style.display = 'block';
        }
    </script>
</body>

</html>
