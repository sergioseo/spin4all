<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Orquestração | Spin4all</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #00d2ff;
            --accent-green: #00ffa3;
            --accent-red: #ff4d4d;
            --bg-dark: #0a0e14;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .monitoring-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .process-list {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
        }

        .process-item {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1fr;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .process-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .process-name {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .process-step {
            font-size: 0.85rem;
            opacity: 0.8;
            color: var(--accent-blue);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            width: fit-content;
        }

        .status-WORKING { background: rgba(0, 210, 255, 0.1); color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .status-SUCCESS { background: rgba(0, 255, 163, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .status-FAIL { background: rgba(255, 77, 77, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            transition: 0.5s ease;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="monitoring-container">
        <header>
            <div>
                <h1>Orquestração AI & Data</h1>
                <p style="opacity: 0.6">Monitoramento de processos em tempo real</p>
            </div>
            <div id="last-update" style="font-size: 0.8rem; opacity: 0.5">Última atualização: --:--:--</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total Hoje</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" style="color: var(--accent-green)" id="stat-success">0</span>
                <span class="stat-label">Sucesso</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" style="color: var(--accent-red)" id="stat-fail">0</span>
                <span class="stat-label">Falhas</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" style="color: var(--accent-blue)" id="stat-working">0</span>
                <span class="stat-label">Ativos</span>
            </div>
        </div>

        <div class="process-list" id="process-list">
            <!-- Items injected by JS -->
            <div class="process-item" style="opacity: 0.3">
                <span>Iniciando monitoramento...</span>
            </div>
        </div>
    </div>

    <script type="module" src="/js/modules/admin/monitoring.js?v=999"></script>
</body>
</html>
