<!-- ABA: MEU PERFIL (Habilidades & Objetivos) -->
<div class="profile-layout-wrap">
    <div class="profile-main-container">
        <!-- ROW 2: INDICATORS (6 CARDS) -->
        <div class="profile-indicators-grid">
            <div class="indicator-card">
                <span class="indicator-label">Estilo de Jogo</span>
                <span id="user-style" class="indicator-value accent">--</span>
            </div>
            <div class="indicator-card">
                <span class="indicator-label">Altura</span>
                <span id="user-height-full" class="indicator-value">--</span>
            </div>
            <div class="indicator-card">
                <span class="indicator-label">Peso</span>
                <span id="user-weight-full" class="indicator-value">--</span>
            </div>
            <div class="indicator-card">
                <span class="indicator-label">Empunhadura</span>
                <span id="user-grip" class="indicator-value">--</span>
            </div>
            <div class="indicator-card">
                <span class="indicator-label">Lateralidade</span>
                <span id="user-side" class="indicator-value">--</span>
            </div>
            <div class="indicator-card">
                <span class="indicator-label">IMC</span>
                <span id="user-imc" class="indicator-value">--</span>
            </div>
        </div>

        <!-- ROW 3: ANALYSIS (EQUAL HEIGHT) -->
        <div class="profile-rows-container">
            <!-- SIDEBAR -->
            <div class="profile-block-card sidebar-block">
                <div class="card-title">
                    <i class="fas fa-list-ul"></i> Evolução Técnica
                </div>
                
                <div id="skills-list-compact" style="flex: 1; display: flex; flex-direction: column;">
                    <!-- Dynamically Rendered -->
                </div>

                <button id="btn-save-skills" class="btn-auth">
                    <i class="fas fa-save"></i> SALVAR ALTERAÇÕES
                </button>
            </div>

            <!-- RADAR -->
            <!-- RADAR (60%) -->
            <div class="profile-block-card radar-main-card">
                <div class="card-title">
                    <i class="fas fa-dharmachakra"></i> Rede de Habilidades
                </div>
                
                <div class="radar-wrapper">
                    <div class="radar-chart-container">
                        <canvas id="skillsRadarChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- INSIGHTS (40%) -->
            <div class="profile-block-card insights-main-card">
                <div class="card-title">
                    <i class="fas fa-lightbulb"></i> Titulo do box
                </div>
                
                <div class="insights-placeholder-wrap">
                    <div class="radar-placeholder-box">
                        <div class="radar-placeholder-icon">
                            <i class="fas fa-microchip"></i>
                        </div>
                        <span class="radar-placeholder-text">Em breve</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
