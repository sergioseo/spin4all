<!-- ABA: CONFIGURAÇÕES (Dados & Segurança) -->
<div style="display: grid; grid-template-columns: 6.5fr 3.5fr; gap: 25px; align-items: start;">
    <!-- Célula 1: Dados Cadastrais (Larga) -->
    <div class="glass-card">
        <div class="card-title"><i class="fas fa-user-edit"></i> Dados Cadastrais</div>
        <form id="profile-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div style="grid-column: span 2;" class="form-group">
                    <label><i class="fas fa-user"></i> Nome Completo</label>
                    <input type="text" id="edit-name" placeholder="Nome Completo">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-birthday-cake"></i> Data de Nascimento</label>
                    <input type="date" id="edit-birth">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-layer-group"></i> Nível Técnico</label>
                    <select id="edit-level">
                        <option value="Iniciante">Iniciante</option>
                        <option value="Intermediário">Intermediário</option>
                        <option value="Avançado">Avançado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-weight"></i> Peso (kg)</label>
                    <input type="number" id="edit-weight" step="0.1" placeholder="Ex: 75.5">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-ruler-vertical"></i> Altura (cm)</label>
                    <input type="number" id="edit-height" step="1" placeholder="Ex: 175">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-hand-pointer"></i> Lateralidade</label>
                    <select id="edit-lateralidade">
                        <option value="Destro">Destro</option>
                        <option value="Canhoto">Canhoto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-table-tennis-paddle-ball"></i> Empunhadura</label>
                    <select id="edit-grip">
                        <option value="Clássica">Clássica</option>
                        <option value="Caneta">Caneta</option>
                        <option value="Classineta">Classineta</option>
                    </select>
                </div>
                <div class="form-group"></div>
                <div style="grid-column: span 3;" class="form-group">
                    <label><i class="fas fa-bullseye"></i> Minhas Metas</label>
                    <textarea id="edit-goals" placeholder="Descreva seus objetivos..."></textarea>
                </div>
                <div style="grid-column: span 3;" class="form-group">
                    <label style="color: #38bdf8;"><i class="fas fa-comments"></i> Recado para o Mentor</label>
                    <textarea id="edit-mentor-message" placeholder="Dúvidas, sugestões ou avisos para o técnico..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn-primary-gradient">
                <i class="fas fa-save"></i> Salvar Dados Cadastrais
            </button>
        </form>
    </div>

    <!-- Célula 2: Segurança (Estreita) -->
    <div class="glass-card">
        <div class="card-title" style="font-size: 0.9rem;"><i class="fas fa-lock"></i> Alterar Senha</div>
        <form id="password-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="password" id="current-password" placeholder="Senha Atual">
            <input type="password" id="new-password" placeholder="Nova Senha">
            <button type="submit" class="btn-outline-blue">Confirmar Troca</button>
        </form>
    </div>
</div>
