<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nova Senha | Spin4All Cinematic 🛡️</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Toastify -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        :root {
            --brand-primary: #38bdf8;
            --brand-secondary: #10b981;
            --brand-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-gradient: linear-gradient(135deg, #38bdf8, #10b981);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background-visual {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 80% 20%, rgba(56, 189, 248, 0.1), transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(16, 185, 129, 0.1), transparent 40%);
        }

        .floating-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--brand-secondary);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.1;
            animation: float 15s infinite alternate ease-in-out;
            bottom: 10%;
            right: 10%;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        .auth-container { width: 100%; max-width: 480px; padding: 24px; z-index: 10; }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #fff;
        }

        .text-gradient {
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 32px; line-height: 1.5; }

        .form-group { text-align: left; margin-bottom: 24px; }
        .form-group label { display: block; color: #cbd5e1; font-size: 0.85rem; font-weight: 600; margin: 0 0 8px 4px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 20px; color: #64748b; font-size: 20px; transition: color 0.3s; }
        .input-wrapper input {
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px 16px 56px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        .input-wrapper input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); }
        .input-wrapper input:focus + i { color: var(--brand-primary); }

        .btn-luxury {
            width: 100%;
            padding: 16px;
            background: var(--text-gradient);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 20px 40px -10px rgba(56, 189, 248, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-luxury:hover { transform: translateY(-4px); box-shadow: 0 25px 50px -12px rgba(56, 189, 248, 0.5); }

        .auth-footer { margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: var(--brand-primary); }
    </style>
</head>
<body>
    <div class="background-visual"><div class="floating-orb"></div></div>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Nova <span class="text-gradient">Senha</span></h1>
            <p class="auth-subtitle">Crie uma credencial robusta para proteger sua jornada na comunidade.</p>

            <form id="reset-password-form">
                <div class="form-group">
                    <label for="password">Nova Senha</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="password" required placeholder="••••••••" minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <div class="input-wrapper">
                        <i class="ph ph-shield-check"></i>
                        <input type="password" id="confirm-password" required placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="btn-luxury">
                    <span>Atualizar Credencial</span>
                    <i class="ph ph-key-return"></i>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="back-link">
                    <i class="ph ph-caret-left"></i> Voltar para Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Toastify({
                text: "Token ausente. Solicite um novo link.",
                duration: 5000,
                gravity: "top",
                position: "center",
                style: { background: "rgba(239, 68, 68, 0.9)" }
            }).showToast();
            setTimeout(() => window.location.href = 'forgot-password.html', 3000);
        }

        document.getElementById('reset-password-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                Toastify({ text: "As senhas não coincidem.", duration: 3000, gravity: "top", position: "center" }).showToast();
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<span>Salvando...</span><i class="ph ph-circle-notch ph-spin"></i>';

            try {
                const res = await fetch(`${API_URL}/password-reset/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                const result = await res.json();

                if (result.success) {
                    Toastify({
                        text: "Senha atualizada com sucesso! Redirecionando...",
                        duration: 3000,
                        backgroundColor: "#10b981"
                    }).showToast();
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    Toastify({ text: result.message || "Erro ao atualizar.", backgroundColor: "#ef4444" }).showToast();
                }
            } catch (err) {
                Toastify({ text: "Erro de conexão.", backgroundColor: "#ef4444" }).showToast();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Atualizar Credencial</span><i class="ph ph-key-return"></i>';
            }
        };
    </script>
</body>
</html>
